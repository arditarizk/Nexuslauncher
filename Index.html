<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Meta untuk Netlify & Mobile App Feel -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Personal Unified Toolbox by Ardita Rizki Fauzi">
    
    <title>Nexus Pro Hub | Ardita Rizki Fauzi</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            height: 100dvh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Bento Grid Style - Menggunakan warna solid agar performa HP kencang */
        .bento-card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.1s ease, border-color 0.2s ease;
        }

        .bento-card:active {
            transform: scale(0.95);
            background: #2d3e54;
            border-color: #3b82f6;
        }

        #app-overlay {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            display: none;
            flex-direction: column;
            animation: appSlideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes appSlideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .nav-active { color: #3b82f6; }
        .nav-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #3b82f6;
            border-radius: 50%;
        }

        /* Status & Ornament */
        .status-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }

        /* Minimalist Spinner */
        .loader-spin {
            width: 28px;
            height: 28px;
            border: 3px solid #f1f5f9;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* No-scroll Container */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header Section -->
    <header class="pt-10 px-6 pb-4 flex justify-between items-end shrink-0">
        <div>
            <h1 class="text-xl font-black tracking-tight text-white flex items-center gap-2">
                NEXUS <span class="text-[8px] bg-blue-600 px-1.5 py-0.5 rounded text-white tracking-widest font-bold">PRO</span>
            </h1>
            <div class="flex items-center gap-2 mt-1">
                <div class="status-dot"></div>
                <span id="clock" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em]">00:00:00</span>
            </div>
        </div>
        <!-- Profile Action -> Goes to Tools -->
        <button onclick="switchTab('settings', document.getElementById('nav-tools'))" class="w-10 h-10 rounded-2xl bg-slate-800 flex items-center justify-center border border-white/5 active:scale-90 transition-transform">
            <i data-lucide="user" class="w-5 h-5 text-blue-400"></i>
        </button>
    </header>

    <!-- Main Screens Viewport -->
    <main class="flex-1 relative overflow-hidden">
        
        <!-- View: Hub (Daftar Aplikasi) -->
        <section id="view-apps" class="absolute inset-0 p-6 flex flex-col no-scrollbar overflow-y-auto">
            <div class="grid grid-cols-2 gap-3 mb-12">
                
                <button onclick="launch('WhatsApp direct.html', 'WA Direct')" class="bento-card p-6 rounded-[2rem] flex flex-col items-center justify-center gap-3">
                    <div class="w-12 h-12 bg-green-500/10 text-green-500 rounded-xl flex items-center justify-center">
                        <i data-lucide="message-circle" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-300">WA Direct</span>
                </button>

                <button onclick="launch('Smart Expense.html', 'Expense')" class="bento-card p-6 rounded-[2rem] flex flex-col items-center justify-center gap-3">
                    <div class="w-12 h-12 bg-blue-500/10 text-blue-500 rounded-xl flex items-center justify-center">
                        <i data-lucide="wallet" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-300">Expense</span>
                </button>

                <button onclick="launch('meteranListrik.html', 'Listrik')" class="bento-card p-6 rounded-[2rem] flex flex-col items-center justify-center gap-3">
                    <div class="w-12 h-12 bg-amber-500/10 text-amber-500 rounded-xl flex items-center justify-center">
                        <i data-lucide="zap" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-300">Listrik</span>
                </button>

                <button onclick="launch('Servis Tracker.html', 'Tracker')" class="bento-card p-6 rounded-[2rem] flex flex-col items-center justify-center gap-3">
                    <div class="w-12 h-12 bg-purple-500/10 text-purple-500 rounded-xl flex items-center justify-center">
                        <i data-lucide="wrench" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-300">Tracker</span>
                </button>

                <button onclick="launch('starch consumption.html', 'Reports')" class="bento-card p-5 rounded-[2.5rem] flex items-center gap-4 col-span-2">
                    <div class="w-12 h-12 bg-red-500/10 text-red-500 rounded-xl flex items-center justify-center shrink-0">
                        <i data-lucide="bar-chart-3" class="w-6 h-6"></i>
                    </div>
                    <div class="text-left flex-1">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-slate-200">Starch Consumption</span>
                        <p class="text-[8px] text-slate-500 mt-0.5">Automated Material Analysis</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-600"></i>
                </button>
            </div>

            <!-- Footer Signature Ornament -->
            <footer class="mt-auto py-8 text-center">
                <div class="flex items-center justify-center gap-2 mb-3">
                    <div class="h-[0.5px] w-10 bg-slate-800"></div>
                    <i data-lucide="sparkles" class="w-3 h-3 text-blue-500/50"></i>
                    <div class="h-[0.5px] w-10 bg-slate-800"></div>
                </div>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em]">
                    By <span class="text-slate-300">Ardita Rizki Fauzi</span>
                </p>
                <p class="text-[8px] text-slate-600 uppercase tracking-[0.1em] mt-1.5 opacity-60">
                    Powered by Gemini AI • Nexus Framework
                </p>
            </footer>
        </section>

        <!-- View: History (Recent) -->
        <section id="view-recent" class="absolute inset-0 p-8 hidden no-scrollbar overflow-y-auto">
            <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-8">Recent Usage</h2>
            <div id="recent-list" class="space-y-3">
                <div class="text-center py-20 opacity-20">
                    <i data-lucide="clock-rewind" class="w-10 h-10 mx-auto mb-4"></i>
                    <p class="text-[10px] font-bold uppercase tracking-widest">No Recent Data</p>
                </div>
            </div>
        </section>

        <!-- View: Settings (Tools) -->
        <section id="view-settings" class="absolute inset-0 p-8 hidden no-scrollbar overflow-y-auto">
            <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-8">System Tools</h2>
            <div class="space-y-3">
                <div class="p-5 bg-slate-800/40 rounded-3xl border border-white/5 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <i data-lucide="shield-check" class="w-5 h-5 text-blue-400"></i>
                        <span class="text-xs font-semibold">Status Dashboard</span>
                    </div>
                    <span class="text-[8px] font-black text-green-500 uppercase bg-green-500/10 px-2 py-1 rounded">Normal</span>
                </div>
                
                <button onclick="location.reload()" class="w-full p-5 bg-slate-800/40 rounded-3xl border border-white/5 flex items-center gap-4 active:bg-slate-700 transition-colors">
                    <i data-lucide="refresh-cw" class="w-5 h-5 text-slate-400"></i>
                    <span class="text-xs font-semibold">Restart Launcher</span>
                </button>

                <div class="mt-10 p-8 border border-dashed border-slate-800 rounded-[2.5rem] flex flex-col items-center">
                    <p class="text-[9px] text-slate-600 font-bold uppercase mb-2">Build Environment</p>
                    <p class="text-[10px] text-slate-400">V.2.9.0 Production</p>
                    <p class="text-[10px] text-blue-600 font-bold mt-2">@ArditaRizkiFauzi</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="h-20 bg-slate-900 border-t border-white/5 flex items-center justify-around px-10 pb-4 shrink-0 relative z-10">
        <button onclick="switchTab('apps', this)" class="flex flex-col items-center gap-1 nav-active transition-all">
            <i data-lucide="layout-grid" class="w-6 h-6"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Hub</span>
        </button>
        <button onclick="switchTab('recent', this)" class="flex flex-col items-center gap-1 text-slate-500 transition-all">
            <i data-lucide="clock-3" class="w-6 h-6"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Recent</span>
        </button>
        <button id="nav-tools" onclick="switchTab('settings', this)" class="flex flex-col items-center gap-1 text-slate-500 transition-all">
            <i data-lucide="sliders-horizontal" class="w-6 h-6"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Tools</span>
        </button>
    </nav>

    <!-- App Overlay (Iframe Execution) -->
    <div id="app-overlay">
        <div class="h-16 bg-white border-b flex items-center justify-between px-5 shrink-0">
            <div class="flex items-center gap-4 overflow-hidden">
                <button onclick="closeApp()" class="p-2 -ml-2 text-slate-400 active:scale-90 transition-transform">
                    <i data-lucide="chevron-left" class="w-7 h-7"></i>
                </button>
                <div class="flex flex-col overflow-hidden">
                    <span id="active-title" class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-900 truncate">SYSTEM_BOOT</span>
                    <div class="flex items-center gap-1.5">
                        <div class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></div>
                        <span class="text-[8px] font-bold text-blue-600 uppercase">Pro Session</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <i data-lucide="rotate-cw" onclick="reloadFrame()" class="w-4 h-4 text-slate-200 cursor-pointer"></i>
                <button onclick="closeApp()" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-transform">Close</button>
            </div>
        </div>
        <div class="flex-1 bg-white relative overflow-hidden">
            <div id="loader" class="absolute inset-0 bg-white flex flex-col items-center justify-center z-50">
                <div class="loader-spin mb-4"></div>
                <p class="text-[8px] font-black text-slate-300 tracking-[0.4em] uppercase">Initialising</p>
            </div>
            <iframe id="main-frame" src="" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script>
        // Init Icons
        lucide.createIcons();

        const overlay = document.getElementById('app-overlay');
        const frame = document.getElementById('main-frame');
        const loader = document.getElementById('loader');
        const titleLabel = document.getElementById('active-title');
        const recentList = document.getElementById('recent-list');

        let appRecent = [];

        // Digital Clock
        function syncClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour12: false});
        }
        setInterval(syncClock, 1000);
        syncClock();

        // Screen Switching
        function switchTab(viewId, btn) {
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('nav-active');
                b.classList.add('text-slate-500');
            });
            btn.classList.add('nav-active');
            btn.classList.remove('text-slate-500');

            ['apps', 'recent', 'settings'].forEach(v => {
                document.getElementById('view-' + v).classList.add('hidden');
            });
            document.getElementById('view-' + viewId).classList.remove('hidden');
        }

        // Launch Application
        function launch(url, title) {
            titleLabel.innerText = title;
            loader.style.display = 'flex';
            frame.src = url;
            overlay.style.display = 'flex';

            // History Log
            const time = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
            appRecent = appRecent.filter(i => i.title !== title); // avoid dupes
            appRecent.unshift({ title, url, time });
            if (appRecent.length > 5) appRecent.pop();
            renderRecent();

            frame.onload = () => { 
                setTimeout(() => { loader.style.display = 'none'; }, 600);
            };
        }

        function closeApp() {
            overlay.style.display = 'none';
            frame.src = "";
        }

        function reloadFrame() {
            loader.style.display = 'flex';
            frame.src = frame.src;
        }

        function renderRecent() {
            if (appRecent.length === 0) return;
            recentList.innerHTML = appRecent.map(item => `
                <div onclick="launch('${item.url}', '${item.title}')" class="p-5 bg-slate-800/60 rounded-[1.5rem] flex justify-between items-center active:bg-slate-700 transition-all border border-white/5">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-blue-600/10 rounded-lg flex items-center justify-center text-blue-500">
                            <i data-lucide="play" class="w-3 h-3"></i>
                        </div>
                        <span class="text-xs font-bold text-white uppercase tracking-wider">${item.title}</span>
                    </div>
                    <span class="text-[8px] text-slate-500 font-bold">${item.time}</span>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Intercept native mobile back action
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = () => {
            if (overlay.style.display === 'flex') {
                closeApp();
                window.history.pushState(null, null, window.location.href);
            }
        };
    </script>
</body>
</html>
